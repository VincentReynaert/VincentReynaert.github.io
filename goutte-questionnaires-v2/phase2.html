<!doctype html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Phase 2</title>
  <link rel="stylesheet" href="./styles.css">
</head>

<body>
  <main id="app" class="container"></main>
  <script type="module">
    import { renderPhase } from './shared/phase-app.js';
    const params = new URLSearchParams(window.location.search);
    const condition = (params.get('condition') || '').toLowerCase();
    const isVr = condition.includes('vr') || condition.includes('jeu');
    renderPhase({
      phase: 'phase2',
      title: 'Phase 2',
      description: 'Charge cognitive + NASA-TLX + UX + PANAS + QCM post + auto-efficacité post.',
      requirePidLookup: true,
      condition: condition || '',
      steps: [
        { key: isVr ? 'chargeco_vr' : 'chargeco_cours', label: isVr ? 'Charge cognitive VR' : 'Charge cognitive Cours', href: isVr ? './chargeco-vr.html' : './chargeco-cours.html' },
        { key: isVr ? 'nasa_vr' : 'nasa_cours', label: isVr ? 'NASA-TLX VR' : 'NASA-TLX Cours', href: isVr ? './nasa-vr.html' : './nasa-cours.html' },
        { key: isVr ? 'ux_vr' : 'ux_cours', label: isVr ? 'UX VR' : 'UX Cours', href: isVr ? './ux-vr.html' : './ux-cours.html' },
        { key: 'panas', label: 'PANAS', href: './panas.html' },
        { key: 'qcm_post', label: 'QCM post', href: './qcm-post.html' },
        { key: 'autoefficacy_post', label: 'Auto-efficacité post', href: './autoefficacy-post.html' },
      ],
    });
  </script>
  <button class="btn" id="btnDownloadPhaseJson" type="button" hidden>
    Télécharger le JSON de la phase
  </button>
</body>

</html>
